spring.application.name=silent-signals
server.port=8011

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/silent_signals_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${GMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

security.jwt.secret=${JWT_SECRET:change-this-access-secret-to-a-long-random-value}
security.jwt.refresh-secret=${JWT_REFRESH_SECRET:change-this-refresh-secret-to-a-long-random-value}

app.redis.enabled=${APP_REDIS_ENABLED:true}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
