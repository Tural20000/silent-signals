spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.redis.repositories.enabled=false
spring.main.allow-bean-definition-overriding=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
app.redis.enabled=false

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test

security.jwt.secret=test-access-secret-test-access-secret-123456789
security.jwt.refresh-secret=test-refresh-secret-test-refresh-secret-123456

management.endpoints.web.exposure.include=health,info
